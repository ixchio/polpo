name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @polpo-ai/core build
          pnpm --filter @polpo-ai/vault-crypto build
          pnpm --filter @polpo-ai/drizzle build
          pnpm --filter @polpo-ai/tools build
          pnpm --filter @polpo-ai/server build
          pnpm --filter @polpo-ai/sdk build
          pnpm --filter @polpo-ai/react build
          ./node_modules/.bin/tsc

      - name: Publish @polpo-ai/core
        run: pnpm --filter @polpo-ai/core publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/vault-crypto
        run: pnpm --filter @polpo-ai/vault-crypto publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/drizzle
        run: pnpm --filter @polpo-ai/drizzle publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/tools
        run: pnpm --filter @polpo-ai/tools publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/server
        run: pnpm --filter @polpo-ai/server publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/sdk
        run: pnpm --filter @polpo-ai/sdk publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/react
        run: pnpm --filter @polpo-ai/react publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish polpo-ai
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-notes:
    name: Release Notes
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
