name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [typecheck]
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polpo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run tests
        run: pnpm run test run
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/polpo_test

  install-check:
    name: Install Check
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Pack all workspace packages
        run: |
          pnpm --filter @polpo-ai/core pack --pack-destination /tmp/tarballs
          pnpm --filter @polpo-ai/vault-crypto pack --pack-destination /tmp/tarballs
          pnpm --filter @polpo-ai/drizzle pack --pack-destination /tmp/tarballs
          pnpm --filter @polpo-ai/llm pack --pack-destination /tmp/tarballs
          pnpm --filter @polpo-ai/server pack --pack-destination /tmp/tarballs
          pnpm --filter @polpo-ai/tools pack --pack-destination /tmp/tarballs
          pnpm pack --pack-destination /tmp/tarballs
      - name: Verify npm install from tarball
        run: |
          mkdir /tmp/install-test && cd /tmp/install-test
          npm init -y
          npm install /tmp/tarballs/*.tgz
          node --input-type=module -e "import 'polpo-ai'"
